<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Simple Drawing Tool</title>

  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
</head>
<body>

  <div> About </div>
  
  <div class="outFrame">
    
    <div id="toolbar">
      
      <div class="farbe">
      <label>Farbe:
        <input type="color" id="colorPicker" value="#000000">
      </label>
      </div>

      <div class="pinselWahl"> 
      <label>Pinselgröße:
        <input type="range" id="sizeSlider" min="1" max="50" value="10">
        <span id="sizeLabel">10</span> px
      </label>

      <button id="clearBtn">Löschen</button>
    </div>
    </div>

    <div id="canvas-wrapper"></div>
    </div>

  <div class="outButton">
  <div id="buttonBar"></div>
</div>
  
  <script src="script.js"></script>
</body>
</html>
